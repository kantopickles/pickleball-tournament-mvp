<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1500" viewBox="0 0 1600 1500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8f3"/>
      <stop offset="0.45" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff4df"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#1f261f" flood-opacity="0.13"/>
    </filter>
    <filter id="deviceShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#1f261f" flood-opacity="0.22"/>
    </filter>
  </defs>

  <rect width="1600" height="1500" fill="url(#bg)"/>
  <circle cx="140" cy="140" r="310" fill="#42c884" opacity="0.1"/>
  <circle cx="1470" cy="260" r="280" fill="#f06f45" opacity="0.09"/>
  <circle cx="1220" cy="1440" r="360" fill="#f5d35f" opacity="0.14"/>

  <g font-family="Trebuchet MS, Hiragino Sans, Yu Gothic, sans-serif">
    <rect x="110" y="70" width="1380" height="170" rx="26" fill="#ffffff" stroke="#d8dfd2" filter="url(#shadow)"/>
    <text x="160" y="130" fill="#d96a22" font-size="18" font-weight="900">Participant guide sample</text>
    <text x="160" y="188" fill="#1f261f" font-size="48" font-weight="900">参加者向けの使い方</text>
    <text x="760" y="184" fill="#4e5a50" font-size="22">PCでもスマホでも、同じ流れで結果入力できます。</text>

    <rect x="110" y="290" width="1380" height="520" rx="26" fill="#ffffff" stroke="#d8dfd2" filter="url(#shadow)"/>
    <text x="160" y="352" fill="#d96a22" font-size="18" font-weight="900">PC VIEW</text>
    <text x="160" y="394" fill="#1f261f" font-size="34" font-weight="900">パソコンで入力する場合</text>
    <text x="160" y="436" fill="#4e5a50" font-size="20">大会一覧から大会を開き、リーグ表の「未入力」または試合一覧から対象試合を選びます。</text>

    <g transform="translate(160 470)" filter="url(#deviceShadow)">
      <rect x="0" y="0" width="880" height="300" rx="18" fill="#1f261f"/>
      <rect x="16" y="18" width="848" height="250" rx="10" fill="#f7f8f3"/>
      <circle cx="42" cy="283" r="7" fill="#6f7a70"/>
      <rect x="84" y="278" width="710" height="10" rx="5" fill="#d8dfd2"/>

      <rect x="42" y="42" width="796" height="74" rx="12" fill="#ffffff" stroke="#d8dfd2"/>
      <text x="68" y="72" fill="#d96a22" font-size="13" font-weight="900">Tournaments</text>
      <text x="68" y="101" fill="#1f261f" font-size="23" font-weight="900">大会一覧</text>
      <rect x="524" y="64" width="278" height="34" rx="8" fill="#f7f8f3" stroke="#d8dfd2"/>
      <text x="544" y="86" fill="#6f7a70" font-size="13">削除する場合は作成用PIN</text>

      <rect x="42" y="138" width="380" height="90" rx="12" fill="#ffffff" stroke="#d8dfd2"/>
      <text x="66" y="172" fill="#1f261f" font-size="20" font-weight="900">リーグテスト1</text>
      <text x="66" y="201" fill="#6f7a70" font-size="14">リーグ戦 / 3ブロック / 1本勝負</text>
      <rect x="326" y="166" width="64" height="34" rx="7" fill="#42c884"/>
      <text x="346" y="188" fill="#062114" font-size="14" font-weight="900">開く</text>

      <rect x="458" y="138" width="380" height="90" rx="12" fill="#ffffff" stroke="#d8dfd2"/>
      <text x="482" y="172" fill="#1f261f" font-size="20" font-weight="900">春のミックスダブルス</text>
      <text x="482" y="201" fill="#6f7a70" font-size="14">総当たり / 3本勝負</text>
      <rect x="742" y="166" width="64" height="34" rx="7" fill="#42c884"/>
      <text x="762" y="188" fill="#062114" font-size="14" font-weight="900">開く</text>
    </g>

    <g transform="translate(1080 472)">
      <rect x="0" y="0" width="350" height="84" rx="16" fill="#f7f8f3" stroke="#d8dfd2"/>
      <circle cx="42" cy="42" r="21" fill="#dff4e8"/>
      <text x="35" y="50" fill="#42c884" font-size="22" font-weight="900">1</text>
      <text x="78" y="34" fill="#1f261f" font-size="18" font-weight="900">大会を開く</text>
      <text x="78" y="60" fill="#4e5a50" font-size="14">大会一覧の「開く」を押します。</text>

      <rect x="0" y="108" width="350" height="84" rx="16" fill="#f7f8f3" stroke="#d8dfd2"/>
      <circle cx="42" cy="150" r="21" fill="#dff4e8"/>
      <text x="35" y="158" fill="#42c884" font-size="22" font-weight="900">2</text>
      <text x="78" y="142" fill="#1f261f" font-size="18" font-weight="900">未入力を選ぶ</text>
      <text x="78" y="168" fill="#4e5a50" font-size="14">リーグ表や勝ち上がり表から移動。</text>

      <rect x="0" y="216" width="350" height="84" rx="16" fill="#f7f8f3" stroke="#d8dfd2"/>
      <circle cx="42" cy="258" r="21" fill="#dff4e8"/>
      <text x="35" y="266" fill="#42c884" font-size="22" font-weight="900">3</text>
      <text x="78" y="250" fill="#1f261f" font-size="18" font-weight="900">点数とPINを保存</text>
      <text x="78" y="276" fill="#4e5a50" font-size="14">保存後はロックされます。</text>
    </g>

    <rect x="110" y="870" width="1380" height="540" rx="26" fill="#ffffff" stroke="#d8dfd2" filter="url(#shadow)"/>
    <text x="160" y="932" fill="#d96a22" font-size="18" font-weight="900">MOBILE VIEW</text>
    <text x="160" y="974" fill="#1f261f" font-size="34" font-weight="900">スマホで入力する場合</text>
    <text x="160" y="1016" fill="#4e5a50" font-size="20">スマホでは縦に並びます。未入力を押したあと、試合カード内で点数と参加者PINを入力します。</text>

    <g transform="translate(170 1050)" filter="url(#deviceShadow)">
      <rect x="0" y="0" width="260" height="330" rx="34" fill="#1f261f"/>
      <rect x="15" y="24" width="230" height="282" rx="22" fill="#f7f8f3"/>
      <rect x="89" y="12" width="82" height="7" rx="4" fill="#6f7a70"/>
      <circle cx="130" cy="317" r="8" fill="#6f7a70"/>
      <rect x="34" y="48" width="192" height="62" rx="10" fill="#ffffff" stroke="#d8dfd2"/>
      <text x="50" y="74" fill="#d96a22" font-size="11" font-weight="900">Tournaments</text>
      <text x="50" y="96" fill="#1f261f" font-size="18" font-weight="900">大会一覧</text>
      <rect x="34" y="126" width="192" height="82" rx="12" fill="#ffffff" stroke="#d8dfd2"/>
      <text x="50" y="156" fill="#1f261f" font-size="16" font-weight="900">リーグテスト1</text>
      <text x="50" y="178" fill="#6f7a70" font-size="11">リーグ戦 / 1本勝負</text>
      <rect x="50" y="188" width="152" height="28" rx="7" fill="#42c884"/>
      <text x="110" y="207" fill="#062114" font-size="12" font-weight="900">開く</text>
    </g>

    <g transform="translate(500 1050)" filter="url(#deviceShadow)">
      <rect x="0" y="0" width="260" height="330" rx="34" fill="#1f261f"/>
      <rect x="15" y="24" width="230" height="282" rx="22" fill="#f7f8f3"/>
      <rect x="89" y="12" width="82" height="7" rx="4" fill="#6f7a70"/>
      <circle cx="130" cy="317" r="8" fill="#6f7a70"/>
      <text x="34" y="58" fill="#d96a22" font-size="11" font-weight="900">League matrix</text>
      <text x="34" y="82" fill="#1f261f" font-size="18" font-weight="900">リーグ表</text>
      <rect x="34" y="104" width="192" height="120" rx="10" fill="#ffffff" stroke="#d8dfd2"/>
      <line x1="34" y1="144" x2="226" y2="144" stroke="#d8dfd2"/>
      <line x1="34" y1="184" x2="226" y2="184" stroke="#d8dfd2"/>
      <line x1="98" y1="104" x2="98" y2="224" stroke="#d8dfd2"/>
      <line x1="162" y1="104" x2="162" y2="224" stroke="#d8dfd2"/>
      <rect x="110" y="154" width="44" height="22" rx="5" fill="#fff3ca"/>
      <text x="115" y="169" fill="#b27a00" font-size="10" font-weight="900">未入力</text>
      <text x="34" y="260" fill="#4e5a50" font-size="13">未入力をタップ</text>
    </g>

    <g transform="translate(830 1050)" filter="url(#deviceShadow)">
      <rect x="0" y="0" width="260" height="330" rx="34" fill="#1f261f"/>
      <rect x="15" y="24" width="230" height="282" rx="22" fill="#f7f8f3"/>
      <rect x="89" y="12" width="82" height="7" rx="4" fill="#6f7a70"/>
      <circle cx="130" cy="317" r="8" fill="#6f7a70"/>
      <rect x="34" y="48" width="192" height="230" rx="12" fill="#ffffff" stroke="#d8dfd2"/>
      <text x="52" y="80" fill="#42c884" font-size="12" font-weight="900">R1 / 1</text>
      <text x="52" y="106" fill="#1f261f" font-size="17" font-weight="900">Aさん vs Bさん</text>
      <rect x="52" y="124" width="62" height="34" rx="7" fill="#f7f8f3" stroke="#d8dfd2"/>
      <text x="77" y="147" fill="#1f261f" font-size="15" font-weight="900">11</text>
      <text x="124" y="147" fill="#1f261f" font-size="15" font-weight="900">-</text>
      <rect x="144" y="124" width="62" height="34" rx="7" fill="#f7f8f3" stroke="#d8dfd2"/>
      <text x="170" y="147" fill="#1f261f" font-size="15" font-weight="900">8</text>
      <text x="52" y="184" fill="#1f261f" font-size="12" font-weight="900">参加者PIN</text>
      <rect x="52" y="194" width="154" height="30" rx="7" fill="#f7f8f3" stroke="#d8dfd2"/>
      <rect x="52" y="236" width="154" height="32" rx="7" fill="#42c884"/>
      <text x="98" y="257" fill="#062114" font-size="12" font-weight="900">結果を保存</text>
    </g>

    <g transform="translate(1180 1060)">
      <rect x="0" y="0" width="220" height="58" rx="14" fill="#dff4e8"/>
      <text x="24" y="37" fill="#1f261f" font-size="17" font-weight="900">1. 大会を開く</text>
      <rect x="0" y="84" width="220" height="58" rx="14" fill="#fff3ca"/>
      <text x="24" y="121" fill="#1f261f" font-size="17" font-weight="900">2. 未入力を押す</text>
      <rect x="0" y="168" width="220" height="58" rx="14" fill="#dff4e8"/>
      <text x="24" y="205" fill="#1f261f" font-size="17" font-weight="900">3. 保存する</text>
    </g>
  </g>
</svg>
