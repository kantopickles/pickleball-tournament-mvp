<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="1280" viewBox="0 0 1440 1280">
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7f8f3"/>
      <stop offset="0.45" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff4df"/>
    </linearGradient>
    <linearGradient id="hero" x1="120" y1="70" x2="1320" y2="280">
      <stop offset="0" stop-color="#e9f7ee"/>
      <stop offset="0.52" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff1da"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#1f261f" flood-opacity="0.12"/>
    </filter>
    <filter id="phoneShadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="14" flood-color="#1f261f" flood-opacity="0.2"/>
    </filter>
  </defs>

  <rect width="1440" height="1280" fill="url(#pageBg)"/>
  <circle cx="110" cy="90" r="260" fill="#42c884" opacity="0.12"/>
  <circle cx="1320" cy="240" r="240" fill="#f06f45" opacity="0.1"/>
  <circle cx="1200" cy="1180" r="280" fill="#f5d35f" opacity="0.14"/>

  <g font-family="Trebuchet MS, Hiragino Sans, Yu Gothic, sans-serif">
    <rect x="100" y="72" width="1240" height="210" rx="26" fill="url(#hero)" stroke="#d8dfd2" filter="url(#shadow)"/>
    <text x="148" y="130" fill="#d96a22" font-size="18" font-weight="800">Participant guide sample</text>
    <text x="148" y="188" fill="#1f261f" font-size="48" font-weight="900">参加者向けの使い方</text>
    <text x="148" y="236" fill="#4e5a50" font-size="22">画像を見ながら、試合を探して結果を入力できます。</text>
    <rect x="1080" y="128" width="200" height="62" rx="12" fill="#42c884"/>
    <text x="1124" y="168" fill="#062114" font-size="20" font-weight="900">大会画面へ</text>

    <rect x="100" y="330" width="1240" height="280" rx="24" fill="#ffffff" stroke="#d8dfd2" filter="url(#shadow)"/>
    <circle cx="160" cy="397" r="28" fill="#dff4e8"/>
    <text x="151" y="407" fill="#42c884" font-size="28" font-weight="900">1</text>
    <text x="210" y="392" fill="#1f261f" font-size="32" font-weight="900">大会一覧から、自分の大会を開く</text>
    <text x="210" y="435" fill="#4e5a50" font-size="20">送られてきたURLを開いたら、大会一覧の「開く」を押します。</text>

    <g transform="translate(930 360)" filter="url(#phoneShadow)">
      <rect x="0" y="0" width="230" height="190" rx="22" fill="#1f261f"/>
      <rect x="14" y="14" width="202" height="162" rx="14" fill="#f7f8f3"/>
      <rect x="32" y="34" width="166" height="36" rx="8" fill="#ffffff" stroke="#d8dfd2"/>
      <text x="48" y="58" fill="#1f261f" font-size="15" font-weight="800">大会一覧</text>
      <rect x="32" y="86" width="166" height="60" rx="10" fill="#ffffff" stroke="#d8dfd2"/>
      <text x="48" y="110" fill="#1f261f" font-size="13" font-weight="800">リーグテスト1</text>
      <rect x="134" y="116" width="48" height="22" rx="5" fill="#42c884"/>
      <text x="148" y="132" fill="#062114" font-size="11" font-weight="900">開く</text>
    </g>

    <rect x="100" y="650" width="1240" height="280" rx="24" fill="#ffffff" stroke="#d8dfd2" filter="url(#shadow)"/>
    <circle cx="160" cy="717" r="28" fill="#dff4e8"/>
    <text x="151" y="727" fill="#42c884" font-size="28" font-weight="900">2</text>
    <text x="210" y="712" fill="#1f261f" font-size="32" font-weight="900">リーグ表や試合一覧から、未入力の試合を選ぶ</text>
    <text x="210" y="755" fill="#4e5a50" font-size="20">「未入力」を押すと、その試合の点数入力欄へ移動します。</text>

    <g transform="translate(910 670)" filter="url(#phoneShadow)">
      <rect x="0" y="0" width="270" height="210" rx="22" fill="#1f261f"/>
      <rect x="14" y="14" width="242" height="182" rx="14" fill="#f7f8f3"/>
      <text x="32" y="46" fill="#1f261f" font-size="15" font-weight="900">リーグ表</text>
      <rect x="32" y="64" width="206" height="104" rx="8" fill="#ffffff" stroke="#d8dfd2"/>
      <line x1="32" y1="99" x2="238" y2="99" stroke="#d8dfd2"/>
      <line x1="100" y1="64" x2="100" y2="168" stroke="#d8dfd2"/>
      <line x1="169" y1="64" x2="169" y2="168" stroke="#d8dfd2"/>
      <rect x="114" y="112" width="42" height="26" rx="5" fill="#fff3ca"/>
      <text x="119" y="130" fill="#b27a00" font-size="11" font-weight="900">未入力</text>
    </g>

    <rect x="100" y="970" width="1240" height="240" rx="24" fill="#ffffff" stroke="#d8dfd2" filter="url(#shadow)"/>
    <circle cx="160" cy="1037" r="28" fill="#dff4e8"/>
    <text x="151" y="1047" fill="#42c884" font-size="28" font-weight="900">3</text>
    <text x="210" y="1032" fill="#1f261f" font-size="32" font-weight="900">点数と参加者PINを入れて、結果を保存</text>
    <text x="210" y="1075" fill="#4e5a50" font-size="20">保存後はロックされます。間違えた場合は大会管理者に連絡します。</text>

    <g transform="translate(910 980)" filter="url(#phoneShadow)">
      <rect x="0" y="0" width="270" height="190" rx="22" fill="#1f261f"/>
      <rect x="14" y="14" width="242" height="162" rx="14" fill="#f7f8f3"/>
      <text x="32" y="44" fill="#42c884" font-size="13" font-weight="900">R1 / 1</text>
      <text x="32" y="68" fill="#1f261f" font-size="16" font-weight="900">Aさん vs Bさん</text>
      <rect x="32" y="82" width="72" height="30" rx="6" fill="#ffffff" stroke="#d8dfd2"/>
      <text x="60" y="103" fill="#1f261f" font-size="14" font-weight="900">11</text>
      <text x="124" y="103" fill="#1f261f" font-size="14" font-weight="900">-</text>
      <rect x="146" y="82" width="72" height="30" rx="6" fill="#ffffff" stroke="#d8dfd2"/>
      <text x="174" y="103" fill="#1f261f" font-size="14" font-weight="900">8</text>
      <rect x="32" y="122" width="186" height="24" rx="5" fill="#ffffff" stroke="#d8dfd2"/>
      <text x="44" y="139" fill="#8b948a" font-size="11">参加者PIN</text>
      <rect x="32" y="152" width="186" height="28" rx="6" fill="#42c884"/>
      <text x="88" y="171" fill="#062114" font-size="12" font-weight="900">結果を保存</text>
    </g>
  </g>
</svg>
