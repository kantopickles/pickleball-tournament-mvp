  <text x="430" y="590" fill="#17211f" font-family="Arial, sans-serif" font-size="22" font-weight="700">2. SQL Editor に貼り付けて Run</text>
  <text x="430" y="622" fill="#17211f" font-family="Arial, sans-serif" font-size="18">schema.sql の中身を全部コピーします。</text>
  <text x="86" y="735" fill="#66736f" font-family="Arial, sans-serif" font-size="16">案内図: 実際のSupabase画面とは細部が違う場合があります。</text>
