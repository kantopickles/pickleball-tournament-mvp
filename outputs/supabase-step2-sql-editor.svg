  <rect x="395" y="225" width="660" height="320" rx="10" fill="#0f1216" stroke="#343b45"/>
  <text x="425" y="270" fill="#7dd3fc" font-family="Menlo, monospace" font-size="18">create extension if not exists "pgcrypto";</text>
  <text x="425" y="312" fill="#dce3ea" font-family="Menlo, monospace" font-size="18">create table if not exists tournaments (</text>
  <text x="455" y="352" fill="#dce3ea" font-family="Menlo, monospace" font-size="18">id uuid primary key default gen_random_uuid(),</text>
  <text x="455" y="392" fill="#dce3ea" font-family="Menlo, monospace" font-size="18">slug text unique not null</text>
  <text x="425" y="432" fill="#dce3ea" font-family="Menlo, monospace" font-size="18">);</text>
